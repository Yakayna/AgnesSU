name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and extract signing info
        run: |
          # Generate keystore
          keytool -genkey -v \
            -keystore agnessu.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias agnessu \
            -storepass agnessu123 \
            -keypass agnessu123 \
            -dname "CN=AgnesSU, OU=AgnesSU, O=AgnesSU, L=VN, ST=VN, C=VN"

          # Export certificate in DER format
          keytool -exportcert -keystore agnessu.jks -alias agnessu -storepass agnessu123 -file cert.der

          # Get certificate size and SHA256 hash
          CERT_SIZE=$(wc -c < cert.der)
          CERT_HASH=$(sha256sum cert.der | cut -d' ' -f1)
          CERT_SIZE_HEX=$(printf '0x%x' $CERT_SIZE)

          echo ""
          echo "========================================"
          echo "  SIGNING CERTIFICATE INFO"
          echo "========================================"
          echo "Certificate Size: $CERT_SIZE ($CERT_SIZE_HEX)"
          echo "Certificate SHA256: $CERT_HASH"
          echo ""
          echo ">>> Update kernel/manager/manager_sign.h:"
          echo "#define EXPECTED_SIZE_AGNESSU $CERT_SIZE_HEX"
          echo "#define EXPECTED_HASH_AGNESSU \"$CERT_HASH\""
          echo ""
          echo "========================================"
          echo "  GITHUB SECRETS TO ADD"
          echo "========================================"
          echo "KEYSTORE_PASSWORD = agnessu123"
          echo "KEY_ALIAS = agnessu"
          echo "KEY_PASSWORD = agnessu123"
          echo "KEYSTORE = (base64, see keystore_base64.txt artifact)"
          echo "========================================"

          # Base64 encode keystore for GitHub secrets
          base64 -w 0 agnessu.jks > keystore_base64.txt

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v7
        with:
          name: agnessu-keystore
          path: |
            agnessu.jks
            keystore_base64.txt
